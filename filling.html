<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>충진기 선택</title>
<style>
  :root{
    --bg:#15181c;
    --panel:#1d2126;
    --panel-edge:#2c3138;
    --steel:#aab2bb;
    --hmi-cyan:#5fd6e8;
    --text:#eef1f4;
    --muted:#8b939c;
    --mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.035) 1px,transparent 1px);
    background-size:22px 22px;
    color:var(--text);
    font-family:'Noto Sans KR','Pretendard',-apple-system,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
  }
  header{padding:60px 20px 30px;text-align:center;position:relative;}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.28em;color:var(--hmi-cyan);text-transform:uppercase;margin-bottom:14px;}
  h1{font-size:clamp(28px,6vw,42px);margin:0 0 10px;font-weight:800;letter-spacing:-0.01em;}
  h1 span{color:var(--hmi-cyan);}
  .sub{color:var(--muted);font-size:15px;max-width:520px;margin:0 auto;line-height:1.6;}

  main{
    flex:1;
    max-width:760px;
    width:100%;
    margin:20px auto 60px;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:20px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:16px;
    padding:40px 24px;
    text-align:center;
    text-decoration:none;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    transition:all .2s ease;
  }
  .card:hover{
    border-color:var(--hmi-cyan);
    transform:translateY(-4px);
    box-shadow:0 16px 40px -16px rgba(95,214,232,.25);
  }
  .card .icon{
    font-size:44px;
    width:84px;height:84px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(95,214,232,.08);
    border:1px solid var(--panel-edge);
    border-radius:50%;
  }
  .card h2{font-size:20px;font-weight:800;margin:0;}
  .card p{font-size:13px;color:var(--muted);margin:0;line-height:1.6;}
  .card .tag{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.15em;
    color:var(--hmi-cyan);
    text-transform:uppercase;
    background:rgba(95,214,232,.1);
    border:1px solid rgba(95,214,232,.25);
    border-radius:999px;
    padding:4px 12px;
  }

  .back{position:fixed;top:18px;left:18px;color:var(--muted);font-family:var(--mono);font-size:12px;text-decoration:none;z-index:30;}
  footer{text-align:center;padding:30px 20px 50px;font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:#555b62;}

  @media(max-width:540px){
    main{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<a href="index.html" class="back">← 처음으로</a>

<header>
  <div class="eyebrow">YKHMI · 충진기</div>
  <h1>충진기 <span>구분</span> 선택</h1>
  <p class="sub">2구(수동) 또는 6구(자동) 중 선택하세요.</p>
</header>

<main>
  <a class="card" href="filling-manual.html">
    <div class="icon">🅰️</div>
    <h2>2구 (수동)</h2>
    <p>2채널 수동 충진기 세팅값</p>
    <span class="tag">바로가기</span>
  </a>

  <a class="card" href="filling-auto.html">
    <div class="icon">⚙️</div>
    <h2>6구 (자동)</h2>
    <p>6채널 자동 충진기 세팅값</p>
    <span class="tag">바로가기</span>
  </a>
</main>

<footer>HERB&amp;LIVING · 충진·캡핑 라인 세팅 가이드</footer>

</body>
</html>
