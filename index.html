<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설비 세팅값 가이드</title>
<style>
  :root{
    --bg:#15181c;
    --panel:#1d2126;
    --panel-edge:#2c3138;
    --steel:#aab2bb;
    --hmi-cyan:#5fd6e8;
    --text:#eef1f4;
    --muted:#8b939c;
    --mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.035) 1px,transparent 1px);
    background-size:22px 22px;
    color:var(--text);
    font-family:'Noto Sans KR','Pretendard',-apple-system,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
  }
  header{padding:60px 20px 30px;text-align:center;}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.28em;color:var(--hmi-cyan);text-transform:uppercase;margin-bottom:14px;}
  h1{font-size:clamp(28px,6vw,42px);margin:0 0 10px;font-weight:800;letter-spacing:-0.01em;}
  h1 span{color:var(--hmi-cyan);}
  .sub{color:var(--muted);font-size:15px;max-width:520px;margin:0 auto;line-height:1.6;}

  main{
    flex:1;
    max-width:1000px;
    width:100%;
    margin:20px auto 60px;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:16px;
    padding:36px 24px;
    text-align:center;
    text-decoration:none;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    transition:all .2s ease;
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .card:hover{
    border-color:var(--hmi-cyan);
    transform:translateY(-4px);
    box-shadow:0 16px 40px -16px rgba(95,214,232,.25);
  }
  .card .icon{
    font-size:44px;
    width:84px;height:84px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(95,214,232,.08);
    border:1px solid var(--panel-edge);
    border-radius:50%;
  }
  .card h2{font-size:19px;font-weight:800;margin:0;}
  .card p{font-size:13px;color:var(--muted);margin:0;line-height:1.6;}
  .card .tag{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.15em;
    color:var(--hmi-cyan);
    text-transform:uppercase;
    background:rgba(95,214,232,.1);
    border:1px solid rgba(95,214,232,.25);
    border-radius:999px;
    padding:4px 12px;
  }
  .card.disabled{
    cursor:default;
    opacity:.55;
  }
  .card.disabled:hover{
    transform:none;
    border-color:var(--panel-edge);
    box-shadow:none;
  }
  .card.disabled .tag{
    color:var(--muted);
    background:rgba(255,255,255,.04);
    border-color:var(--panel-edge);
  }

  footer{text-align:center;padding:30px 20px 50px;font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:#555b62;}

  @media(max-width:760px){
    main{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">YKHMI · 설비 세팅값 가이드</div>
  <h1>설비 <span>세팅값</span> 가이드</h1>
  <p class="sub">설비를 선택하면 해당 세팅값 화면으로 이동합니다.</p>
</header>

<main>
  <a class="card" href="filling.html">
    <div class="icon">🧪</div>
    <h2>충진기</h2>
    <span class="tag">바로가기</span>
  </a>

  <a class="card" href="capping.html">
    <div class="icon">🔧</div>
    <h2>캡핑기</h2>
    <span class="tag">바로가기</span>
  </a>

  <div class="card disabled">
    <div class="icon">🏷️</div>
    <h2>라벨기</h2>
    <span class="tag">준비 중</span>
  </div>
</main>

<footer>HERB&amp;LIVING · 설비 세팅 가이드</footer>

</body>
</html>
